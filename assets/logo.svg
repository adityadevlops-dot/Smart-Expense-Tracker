<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="100%" height="100%" rx="48" fill="#ffffff"/>
  <!-- Piggy bank body -->
  <ellipse cx="270" cy="260" rx="140" ry="100" fill="#2E86AB"/>
  <!-- Slot -->
  <rect x="200" y="200" width="120" height="8" rx="4" fill="#0b3d59"/>
  <!-- Ear -->
  <ellipse cx="350" cy="200" rx="30" ry="22" fill="#2E86AB" transform="rotate(-25 350 200)"/>
  <!-- Eye -->
  <circle cx="240" cy="230" r="8" fill="#ffffff"/>
  <!-- Coin -->
  <circle cx="275" cy="150" r="20" fill="#ffd166"/>
  <!-- Text -->
  <text x="256" y="430" font-family="Segoe UI, Roboto, Arial" font-size="28" fill="#0b3d59" text-anchor="middle">Smart Expense</text>
  <text x="256" y="460" font-family="Segoe UI, Roboto, Arial" font-size="20" fill="#0b3d59" text-anchor="middle">Tracker</text>
</svg>
